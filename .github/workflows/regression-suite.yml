name: Regression Suite

on:
  push:
    paths:
      - "kernel/**"
      - "scripts/**"
      - "README.md"
      - "Cargo.toml"
      - "kernel/Cargo.toml"
      - "src/**"
      - "build.rs"
      - ".github/workflows/regression-suite.yml"
  pull_request:
    paths:
      - "kernel/**"
      - "scripts/**"
      - "README.md"
      - "Cargo.toml"
      - "kernel/Cargo.toml"
      - "src/**"
      - "build.rs"
      - ".github/workflows/regression-suite.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: regression-suite-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  regression-fast:
    name: Serial Regression (Fast)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      JINGOS_SERIAL_DELAY_MS: "12000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 lsof ripgrep

      - name: Setup Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rustfmt, clippy, llvm-tools

      - name: Cache cargo and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'kernel/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run fast regression suite
        run: ./scripts/regression-suite.sh fast

      - name: Upload fast regression logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jingos-regression-logs-fast
          path: /tmp/jingos-*.log
          if-no-files-found: warn

  regression-full:
    name: Serial Regression (Full)
    runs-on: ubuntu-latest
    needs: regression-fast
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'))
    timeout-minutes: 50
    env:
      JINGOS_SERIAL_DELAY_MS: "12000"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 lsof ripgrep

      - name: Setup Rust nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-none
          components: rustfmt, clippy, llvm-tools

      - name: Cache cargo and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.toml', 'kernel/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run full regression suite
        run: ./scripts/regression-suite.sh full

      - name: Upload full regression logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: jingos-regression-logs-full
          path: /tmp/jingos-*.log
          if-no-files-found: warn
